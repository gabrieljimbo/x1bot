version: '3.8'

services:
  backend-n9n:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: n9n-backend
    environment:
      - NODE_ENV=production
      - PORT=3041
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis_vps
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      # ... other envs ...
      # No public ports for internal services if used via Traefik
      # ports:
      #   - "3041:3041"
    volumes:
      - whatsapp_sessions:/app/apps/backend/.wwebjs_auth
      - whatsapp_sessions_data:/app/apps/backend/.wwebjs_cache
      - logs:/app/logs
      - temp_data:/tmp
    networks:
      - internal
      - traefik-public
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3041/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.backend-n9n.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.backend-n9n.entrypoints=websecure"
      - "traefik.http.routers.backend-n9n.tls=true"
      - "traefik.http.routers.backend-n9n.tls.certresolver=mytlschallenge"
      - "traefik.http.services.backend-n9n.loadbalancer.server.port=3041"

  postgres_vps:
    image: postgres:15-alpine
    container_name: n9n-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/prisma/production.conf:/etc/postgresql/postgresql.conf:ro
    # No public ports! accessible only via 'internal' network
    networks:
      - internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: [ "postgres", "-c", "config_file=/etc/postgresql/postgresql.conf" ]

  redis_vps:
    image: redis:7-alpine
    container_name: n9n-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  # ... other services like frontend-n9n, browserless ...

volumes:
  postgres_data:
  redis_data:
  whatsapp_sessions:
  whatsapp_sessions_data:
  logs:
  temp_data:


networks:
  internal:
    internal: true # Isolated from external access
  traefik-public:
    external: true
