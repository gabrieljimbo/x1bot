# PostgreSQL Production-Grade Security Configuration
# Place this in /etc/postgresql/postgresql.conf or include it

# 1. Connectivity & Encryption
# Only allow SSL connections in production
ssl = on
ssl_cert_file = '/etc/ssl/certs/ssl-cert-snakeoil.pem'
ssl_key_file = '/etc/ssl/private/ssl-cert-snakeoil.key'
# force_ssl = on (handled in pg_hba.conf)

# 2. Connection Limits
max_connections = 100
# Reserve connections for superusers to prevent lockout
superuser_reserved_connections = 3

# 3. Logging & Auditing
# Documentation: https://www.postgresql.org/docs/current/runtime-config-logging.html
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'all' # Alternatives: 'mod' or 'ddl' for less noise
log_duration = on
log_line_prefix = '%m [%p] %q%u@%d '
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0

# 4. Resource Policy
# Shared buffers usually 25% of RAM
# shared_buffers = 1GB 
# work_mem = 16MB

# 5. Security Notes
# - Run as 'postgres' user (default)
# - Use pg_hba.conf to restrict IPs/Networks
# - Runtime User vs Migration User:
#   - Runtime: GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public
#   - Migration: Full DDL permissions (OWNER)
